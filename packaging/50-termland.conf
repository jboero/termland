# /etc/ssh/sshd_config.d/50-termland.conf
#
# Register termland-server as an SSH subsystem.
# This is the recommended transport mode — it piggybacks on your existing
# sshd, so there are no extra ports to open, no extra TLS certs to manage,
# and all authentication (keys, LDAP, Kerberos, 2FA) is handled by sshd.
#
# After installing, restart sshd:
#   systemctl restart sshd
#
# Clients connect with:
#   termland-client --ssh user@host
#
# Under the hood this runs: ssh -s user@host termland
# which invokes this subsystem over the SSH channel.

Subsystem termland /usr/bin/termland-server --subsystem
